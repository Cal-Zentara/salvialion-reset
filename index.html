<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=guide.html">
<title>The 15-Minute Reset — Salvia Lion</title>
<script>window.location.replace('guide.html');</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --dark:#0e0e1a; --darker:#080810; --cream:#f0ead8;
    --muted:#a89880; --teal:#5ecec4; --lavender:#c4aee8;
  }
  body {
    font-family:'Jost', sans-serif; font-weight:300; color:var(--cream);
    background:radial-gradient(ellipse at 50% 30%, #1a1a3a 0%, var(--darker) 70%);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    justify-content:center; text-align:center; padding:48px 28px;
  }
  .eyebrow {
    font-size:11px; letter-spacing:5px; text-transform:uppercase;
    color:var(--teal); margin-bottom:28px;
  }
  h1 {
    font-family:'Cormorant Garamond', serif; font-weight:300;
    font-size:48px; line-height:1.05; letter-spacing:1px; margin-bottom:20px;
  }
  h1 span { color:var(--teal); }
  .sub {
    font-family:'Cormorant Garamond', serif; font-style:italic;
    font-size:19px; line-height:1.6; color:var(--lavender);
    max-width:380px; margin-bottom:44px;
  }
  .btn {
    display:inline-block; font-family:'Jost', sans-serif; font-weight:400;
    font-size:15px; letter-spacing:2px; text-transform:uppercase;
    color:var(--darker); background:var(--teal); text-decoration:none;
    padding:18px 44px; border-radius:2px; margin-bottom:18px;
    transition:transform .15s ease;
  }
  .btn:active { transform:scale(0.97); }
  .note { font-size:13px; color:var(--muted); margin-bottom:56px; }
  .cta {
    font-family:'Cormorant Garamond', serif; font-style:italic;
    font-size:17px; color:var(--cream); opacity:0.85; line-height:1.6;
  }
  .cta a { color:var(--teal); text-decoration:none; border-bottom:1px solid rgba(94,206,196,0.4); }
  .brand {
    margin-top:64px; font-size:11px; letter-spacing:4px;
    text-transform:uppercase; color:var(--muted); opacity:0.5;
  }
</style>
</head>
<body>
  <div class="eyebrow">A free gift from Salvia Lion</div>
  <h1>The 15<span>-</span>Minute<br>Reset</h1>
  <div class="sub">For when you have given everything today and have nothing left.</div>

  <a class="btn" href="guide.html">Open the guide</a>
  <div class="note">Free. Yours to keep. Read it tonight.</div>

  <div class="cta">When you are ready for the soak,<br>find the three scents at <a href="https://salvialion.com" target="_blank">salvialion.com</a></div>

  <div class="brand">salvialion.com</div>
</body>
</html>
